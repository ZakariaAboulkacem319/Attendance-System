workflows:
  # iOS uniquement. Pour App Store / TestFlight : configurez ios_signing dans Codemagic + flutter build ipa.
  ios-release:
    name: iOS Release (no code signing)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      vars:
        LANG: en_US.UTF-8
    cache:
      cache_paths:
        - ~/.pub-cache
    scripts:
      - name: Install dependencies
        script: |
          set -e
          flutter clean
          flutter pub get
          flutter build ios --config-only
      - name: CocoaPods (install)
        script: |
          set -e
          cd ios
          pod install --repo-update
      - name: Build iOS (no codesign)
        script: |
          set -e
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/**/*.app
