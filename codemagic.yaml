# Simplified Codemagic configuration for Flutter iOS (AltStore)

workflows:
  flutter-ios:
    name: Flutter iOS (No Sign)
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      vars:
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
    scripts:
      - name: Flutter Clean & Get packages
        script: |
          set -e
          flutter clean
          flutter pub get
      - name: CocoaPods installation
        script: |
          set -e
          cd ios
          rm -rf Podfile.lock Pods
          pod update
          pod install --repo-update
          cd ..
      - name: Build iOS (No codesign)
        script: |
          set -e
          # Step 1: Let Flutter generate all necessary Xcode configuration files
          flutter build ios --release --no-codesign --no-pub || true
          
          # Step 2: Build directly with xcodebuild for full control
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CLANG_ENABLE_EXPLICIT_MODULES=NO \
            BUILD_DIR=$CM_BUILD_DIR/build/ios 2>&1
          cd ..
      - name: Create IPA from .app
        script: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r attendance_system_no_sign.ipa Payload
    artifacts:
      - build/ios/ipa/*.ipa
