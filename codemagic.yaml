workflows:
  android-apk:
    name: Android APK (No Sign)
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      flutter: stable
      java: 17
    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle/caches
    scripts:
      - name: Build Android APK
        script: |
          set -e
          flutter pub get
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk