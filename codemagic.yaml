workflows:
  ios-no-sign:
    name: iOS No Codesign
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    cache:
      cache_paths:
        - ~/.pub-cache
    scripts:
      - name: Build iOS
        script: |
          set -e
          
          # 1. Get packages
          flutter pub get
          
          # 2. Let Flutter upgrade Podfile and generate xcconfig files
          flutter build ios --config-only --no-codesign --no-pub
          
          # 3. AFTER Flutter upgrades Podfile, run pod install fresh
          cd ios && pod install --repo-update && cd ..
          
          # 4. Build with xcodebuild - no CODE_SIGNING on CLI (Xcode 15 bug)
          cd ios
          xcodebuild build \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$CM_BUILD_DIR/DerivedData" \
            2>&1
          cd ..
          
          # 5. Package as IPA
          APP_PATH=$(find "$CM_BUILD_DIR/DerivedData" -name "Runner.app" -type d | head -n 1)
          cd $(dirname "$APP_PATH")
          mkdir -p Payload && cp -r Runner.app Payload/
          zip -r "$CM_BUILD_DIR/Runner.ipa" Payload
    artifacts:
      - "*.ipa"