# Simplified Codemagic configuration for Flutter iOS (AltStore)

workflows:
  flutter-ios:
    name: Flutter iOS (No Sign)
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      vars:
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
    scripts:
      - name: Flutter Clean & Get packages
        script: |
          set -e
          flutter clean
          flutter pub get
      - name: CocoaPods installation
        script: |
          set -e
          cd ios
          rm -rf Podfile.lock Pods
          pod update
          pod install --repo-update
          cd ..
      - name: Build iOS (No codesign)
        script: |
          set -e
          # Build using xcodebuild directly to ensure workspace is used, or let flutter do it.
          # We use verbose to see exactly why cloud_firestore fails to compile if it does.
          flutter build ios --release --no-codesign --no-pub -v
      - name: Create IPA from .app
        script: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r attendance_system_no_sign.ipa Payload
    artifacts:
      - build/ios/ipa/*.ipa
