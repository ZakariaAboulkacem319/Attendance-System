workflows:
  ios-release:
    name: iOS Release (no code signing)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: 16.2
      vars:
        LANG: en_US.UTF-8
    scripts:
      - name: Flutter setup & debug
        script: |
          set -e
          flutter clean
          rm -rf ios/Pods ios/Podfile.lock ios/.symlinks
          flutter pub get

          echo ""
          echo "=== Hidden files in project root ==="
          ls -la .flutter-plugins* 2>/dev/null || echo "No .flutter-plugins files"
          echo ""

          echo "=== .flutter-plugins-dependencies (first 5 lines) ==="
          head -5 .flutter-plugins-dependencies 2>/dev/null || echo "Not found"
          echo ""

          flutter build ios --config-only --no-codesign

          echo ""
          echo "=== After config-only: hidden files ==="
          ls -la .flutter-plugins* 2>/dev/null || echo "No .flutter-plugins files"
          echo ""
          echo "=== ios/.symlinks/plugins/ ==="
          ls -la ios/.symlinks/plugins/ 2>/dev/null || echo "No symlinks"
          echo ""
          echo "=== cloud_firestore symlink content ==="
          ls -la ios/.symlinks/plugins/cloud_firestore/ios/ 2>/dev/null || echo "No cloud_firestore ios dir"
          echo ""
          echo "=== Podfile after Flutter migration ==="
          cat ios/Podfile

      - name: Write Podfile & install pods
        script: |
          set -e

          # Overwrite Podfile with known-good content
          cat > ios/Podfile << 'EOF'
          platform :ios, '15.0'

          ENV['COCOAPODS_DISABLE_STATS'] = 'true'

          project 'Runner', {
            'Debug' => :debug,
            'Profile' => :release,
            'Release' => :release,
          }

          def flutter_root
            generated_xcode_build_settings_path = File.expand_path(File.join('..', 'Flutter', 'Generated.xcconfig'), __FILE__)
            unless File.exist?(generated_xcode_build_settings_path)
              raise "#{generated_xcode_build_settings_path} must exist. If you're running pod install manually, make sure flutter pub get is executed first"
            end
            File.foreach(generated_xcode_build_settings_path) do |line|
              matches = line.match(/\AFLUTTER_ROOT=(.*)\n?\z/)
              return matches[1].strip if matches
            end
            raise "FLUTTER_ROOT not found in #{generated_xcode_build_settings_path}. Try deleting Generated.xcconfig, then run flutter pub get"
          end

          require File.expand_path(File.join('packages', 'flutter_tools', 'bin', 'podhelper'), flutter_root)

          target 'Runner' do
            use_frameworks! :linkage => :static
            use_modular_headers!

            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))

            target 'RunnerTests' do
              inherit! :search_paths
            end
          end

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
                config.build_settings['CLANG_ENABLE_EXPLICIT_MODULES'] = 'NO'
              end
            end
          end
          EOF

          # Remove leading whitespace from heredoc
          sed -i '' 's/^          //' ios/Podfile

          echo "=== FINAL Podfile ==="
          cat ios/Podfile
          echo ""

          # Full pod install
          cd ios
          rm -rf Pods Podfile.lock
          echo "Running pod install..."
          pod install --repo-update 2>&1

          echo ""
          echo "=== Podfile.lock (first 50 lines) ==="
          head -50 Podfile.lock 2>/dev/null || echo "No Podfile.lock!"
          echo ""
          echo "=== Pod target directories ==="
          ls Pods/Target\ Support\ Files/ 2>/dev/null | head -30 || echo "No pods installed!"

      - name: Build with xcodebuild (no codesign)
        script: |
          set -e
          xcodebuild build \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/derivedData \
            CODE_SIGN_IDENTITY='' \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CLANG_ENABLE_EXPLICIT_MODULES=NO
          echo "Build succeeded!"

      - name: Package unsigned IPA
        script: |
          set -e
          APP_PATH=$(find build/derivedData -name "Runner.app" -type d | head -1)
          echo "Found .app at: $APP_PATH"
          mkdir -p build/ipa/Payload
          cp -R "$APP_PATH" build/ipa/Payload/
          cd build/ipa
          zip -r ../AttendanceSystem-unsigned.ipa Payload
          echo "IPA created successfully"
    artifacts:
      - build/AttendanceSystem-unsigned.ipa
