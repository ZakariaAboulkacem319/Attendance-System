# Simplified Codemagic configuration for Flutter iOS (AltStore)

workflows:
  flutter-ios:
    name: Flutter iOS (No Sign)
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      vars:
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
    scripts:
      - name: Flutter Clean & Get packages
        script: |
          set -e
          flutter clean
          flutter pub get

      - name: CocoaPods installation
        script: |
          set -e
          cd ios
          rm -rf Pods
          rm -f Podfile.lock
          pod repo update
          pod install
          cd ..

      - name: Build iOS (No codesign)
        script: |
          set -e
          flutter build ios --release --config-only --no-codesign --no-pub
          cd ios
          xcodebuild build \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" 2>&1
          cd ..

      - name: Create IPA from .app
        script: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/Release-iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r attendance_system_no_sign.ipa Payload

    artifacts:
      - build/ios/ipa/*.ipa