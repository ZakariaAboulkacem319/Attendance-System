workflows:
  ios-no-sign:
    name: iOS No Codesign
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    cache:
      cache_paths:
        - ~/.pub-cache
    scripts:
      - name: Get packages
        script: |
          set -e
          flutter pub get
      - name: Install CocoaPods
        script: |
          set -e
          cd ios
          pod install --repo-update
          cd ..
      - name: Build iOS
        script: |
          set -e
          # --config-only: generate xcconfig ONLY, let flutter upgrade Podfile
          flutter build ios --release --config-only --no-codesign --no-pub
          # Call xcodebuild with fresh DerivedData (prevents stale module cache from previous failed builds)
          # DO NOT pass CODE_SIGNING flags on CLI (Xcode 15 bug drops CocoaPods deps)
          cd ios
          xcodebuild build \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$CM_BUILD_DIR/DerivedData" \
            FRAMEWORK_SEARCH_PATHS="$(inherited) $CM_BUILD_DIR/DerivedData/Build/Products/Release-iphoneos $PWD/Pods/Headers/Public" \
            2>&1
          cd ..
          APP_PATH=$(find "$CM_BUILD_DIR/DerivedData" -name "Runner.app" -type d | head -n 1)
          cd $(dirname "$APP_PATH")
          mkdir -p Payload && cp -r Runner.app Payload/
          zip -r "$CM_BUILD_DIR/Runner.ipa" Payload
    artifacts:
      - "*.ipa"