workflows:
  ios-release:
    name: iOS Release (no code signing)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: 16.2
      vars:
        LANG: en_US.UTF-8
    scripts:
      - name: Install dependencies
        script: |
          set -e
          flutter clean
          rm -rf ios/Pods ios/Podfile.lock ios/.symlinks
          flutter pub get
      - name: Verify plugins & pod install
        script: |
          set -e
          echo "=== Flutter plugins ==="
          cat .flutter-plugins || echo "No .flutter-plugins"
          echo ""
          echo "=== Symlinks ==="
          ls -la ios/.symlinks/plugins/ 2>/dev/null || echo "No symlinks yet"
          echo ""
          cd ios
          pod install --repo-update --verbose 2>&1 | tail -30
          echo ""
          echo "=== Podfile.lock summary ==="
          head -40 Podfile.lock
          echo ""
          echo "=== Pods targets ==="
          ls Pods/Target\ Support\ Files/ 2>/dev/null || echo "No target support files"
      - name: Build iOS (no codesign)
        script: |
          set -e
          flutter build ios --release --no-codesign
      - name: Package unsigned IPA
        script: |
          set -e
          APP_PATH=$(find build/ios -name "Runner.app" -type d | head -1)
          echo "Found .app at: $APP_PATH"
          mkdir -p build/ipa/Payload
          cp -R "$APP_PATH" build/ipa/Payload/
          cd build/ipa
          zip -r ../AttendanceSystem-unsigned.ipa Payload
          echo "IPA created at build/AttendanceSystem-unsigned.ipa"
    artifacts:
      - build/AttendanceSystem-unsigned.ipa
      - build/ios/iphoneos/*.app
