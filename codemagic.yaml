workflows:
  # iOS uniquement – build avec xcodebuild pour éviter les conflits de pod install
  ios-release:
    name: iOS Release (no code signing)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      vars:
        LANG: en_US.UTF-8
    scripts:
      - name: Install dependencies & pod install
        script: |
          set -e
          flutter clean
          rm -rf ios/Pods ios/Podfile.lock ios/.symlinks
          flutter pub get
          flutter build ios --config-only --no-codesign
          cd ios && pod install --repo-update
      - name: Build iOS (xcodebuild, no codesign)
        script: |
          set -e
          xcodebuild build \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY='' \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO | tail -40
          echo "Build succeeded"
    artifacts:
      - build/ios/**/*.app
      - /tmp/xcodebuild_logs/**
