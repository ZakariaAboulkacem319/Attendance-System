workflows:
  # iOS uniquement – build avec xcodebuild pour éviter les conflits de pod install
  ios-release:
    name: iOS Release (no code signing)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      vars:
        LANG: en_US.UTF-8
    scripts:
      - name: Install dependencies & pod install
        script: |
          set -e
          flutter clean
          rm -rf ios/Pods ios/Podfile.lock ios/.symlinks
          flutter pub get
          flutter build ios --config-only --no-codesign
          cd ios && pod install --repo-update
      - name: Build iOS (xcodebuild, no codesign)
        script: |
          set -e
          xcodebuild build \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/derivedData \
            CODE_SIGN_IDENTITY='' \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO
          echo "Xcode build succeeded"
      - name: Package IPA (unsigned)
        script: |
          set -e
          APP_PATH=$(find build/derivedData -name "Runner.app" -type d | head -1)
          echo "Found .app at: $APP_PATH"
          mkdir -p build/ipa/Payload
          cp -R "$APP_PATH" build/ipa/Payload/
          cd build/ipa
          zip -r ../AttendanceSystem-unsigned.ipa Payload
          echo "IPA created at build/AttendanceSystem-unsigned.ipa"
    artifacts:
      - build/AttendanceSystem-unsigned.ipa
      - build/derivedData/Build/Products/Release-iphoneos/*.app
