workflows:
  ios-no-sign:
    name: iOS No Codesign
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build iOS
        script: |
          set -e
          flutter build ios --no-codesign --release
          APP_DIR=$(find build/ios -name "Runner.app" -type d | head -n 1)
          cd $(dirname "$APP_DIR")
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r "$CM_BUILD_DIR/Runner.ipa" Payload
    artifacts:
      - "*.ipa"