workflows:
  ios-no-sign:
    name: iOS No Codesign
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    cache:
      cache_paths:
        - ~/.pub-cache
    scripts:
      - name: Get packages
        script: |
          set -e
          flutter pub get
      - name: Install CocoaPods
        script: |
          set -e
          cd ios
          pod install --repo-update
          cd ..
      - name: Build iOS
        script: |
          set -e
          # --config-only: generate xcconfig ONLY, does NOT call pod install or xcodebuild
          flutter build ios --release --config-only --no-codesign --no-pub
          # Call xcodebuild directly. DO NOT pass CODE_SIGNING on CLI (Xcode 15 bug drops CocoaPods deps).
          # CODE_SIGNING_ALLOWED=NO is already set in Release.xcconfig
          cd ios
          xcodebuild build \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination 'generic/platform=iOS' 2>&1
          cd ..
          APP_PATH=$(find build -name "Runner.app" -type d | head -n 1)
          cd $(dirname "$APP_PATH")
          mkdir -p Payload && cp -r Runner.app Payload/
          zip -r "$CM_BUILD_DIR/Runner.ipa" Payload
    artifacts:
      - "*.ipa"