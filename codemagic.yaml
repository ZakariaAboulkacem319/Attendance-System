# Simplified Codemagic configuration for Flutter iOS (AltStore)

workflows:
  flutter-ios:
    name: Flutter iOS (No Sign)
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      flutter: stable
    scripts:
      - name: Flutter Clean & Get packages
        script: |
          flutter clean
          flutter pub get
      - name: CocoaPods installation
        script: |
          cd ios
          rm -rf Podfile.lock Pods
          # Clear Xcode cache to avoid stale module maps
          rm -rf ~/Library/Developer/Xcode/DerivedData
          pod install --repo-update
          cd ..
      - name: Build iOS (No codesign)
        script: |
          flutter build ios --release --no-codesign --no-pub
      - name: Create IPA from .app
        script: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r attendance_system_no_sign.ipa Payload
    artifacts:
      - build/ios/ipa/*.ipa
